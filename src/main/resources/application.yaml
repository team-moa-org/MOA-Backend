spring:
    application:
        name: moa

    cloud:
        aws:
            credentials:
                access-key: ${AWS_ACCESS_KEY:your-access-key}
                secret-key: ${AWS_SECRET_KEY:your-secret-key}
            s3:
                bucket: ${AWS_S3_BUCKET:your-bucket-name}
                endpoint: ${AWS_S3_URL:https://s3.ap-northeast-2.amazonaws.com}
            region:
                static: ${AWS_REGION:ap-northeast-2}

    datasource:
        url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:moa}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:12345}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true
        show-sql: ${JPA_SHOW_SQL:false}
        open-in-view: false

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            lettuce:
                pool:
                    max-active: 10
                    max-idle: 10
                    min-idle: 2
            timeout: 3000ms

server:
    port: 8080

logging:
    level:
        root: INFO
        org.hibernate.SQL: WARN
        org.hibernate.type.descriptor.sql.BasicBinder: WARN
        moa.moabackend: INFO

jwt:
    secret: ${JWT_SECRET:dGhpc0lzQVZlcnlTZWN1cmVTZWNyZXRLZXlGb3JKV1RUb2tlbkdlbmVyYXRpb25XaXRoSFM1MTJBbGdvcml0aG1JdE11c3RCZUxvbmdFbm91Z2g=}
    access-exp: 3600
    refresh-exp: 604800
    header: Authorization
    prefix: "Bearer "

springdoc:
    default-consumes-media-type: application/json
    default-produces-media-type: application/json
    swagger-ui:
        path: /swagger-ui.html
        groups-order: ASC
        operations-sorter: method
        disable-swagger-default-url: true
        display-request-duration: true
    api-docs:
        path: /v3/api-docs
    show-actuator: true
    override-with-generic-response: true

portone:
    api-key: ${PORTONE_API_KEY:your-api-key}
    api-secret: ${PORTONE_API_SECRET:your-api-secret}


