spring:
    application:
        name: moa

    cloud:
        aws:
            credentials:
                access-key: ${AWS_ACCESS_KEY}
                secret-key: ${AWS_SECRET_KEY}
            s3:
                bucket: ${AWS_S3_BUCKET}
                endpoint: https://s3.ap-northeast-3.amazonaws.com
            region:
                static: ap-northeast-3

    datasource:
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true
        show-sql: ${JPA_SHOW_SQL:false}
        open-in-view: false

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            lettuce:
                pool:
                    max-active: 10
                    max-idle: 10
                    min-idle: 2
            timeout: 3000ms

server:
    port: 8080

logging:
    level:
        root: INFO
        org.hibernate.SQL: WARN
        org.hibernate.type.descriptor.sql.BasicBinder: WARN
        moa.moabackend: INFO

jwt:
    secret: ${JWT_SECRET}
    access-exp: 3600
    refresh-exp: 604800
    header: Authorization
    prefix: "Bearer "

springdoc:
    default-consumes-media-type: application/json
    default-produces-media-type: application/json
    swagger-ui:
        path: /swagger-ui.html
        groups-order: ASC
        operations-sorter: method
        disable-swagger-default-url: true
        display-request-duration: true
    api-docs:
        path: /v3/api-docs
    show-actuator: true
    override-with-generic-response: true

portone:
    api-key: ${PORTONE_API_KEY}
    api-secret: ${PORTONE_API_SECRET}

admin:
    key: ${ADMIN_KEY}
